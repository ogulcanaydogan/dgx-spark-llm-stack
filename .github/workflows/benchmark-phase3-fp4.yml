name: benchmark-phase3-fp4

on:
  workflow_dispatch:

concurrency:
  group: benchmark-phase3-fp4-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-phase3-fp4:
    name: Run FP4 + perplexity benchmarks on DGX Spark
    runs-on: [self-hosted, linux, arm64, dgx-spark]
    timeout-minutes: 720

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set benchmark date
        shell: bash
        run: |
          set -euo pipefail
          BENCH_DATE="$(date -u +%F)"
          echo "BENCH_DATE=${BENCH_DATE}" >> "$GITHUB_ENV"
          echo "INFERENCE_JSON=artifacts/benchmarks/inference-fp4-${BENCH_DATE}.json" >> "$GITHUB_ENV"
          echo "QUALITY_JSON=artifacts/benchmarks/quality-ppl-fp16-nf4-fp4-${BENCH_DATE}.json" >> "$GITHUB_ENV"
          echo "BENCH_ARCHIVE=artifacts/benchmarks/phase3-fp4-${BENCH_DATE}.tar.gz" >> "$GITHUB_ENV"

      - name: Prepare isolated benchmark venv
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv-bench-ci
          source .venv-bench-ci/bin/activate
          python -m pip install --upgrade pip setuptools wheel

          python -m pip install \
            transformers \
            accelerate \
            datasets \
            tokenizers \
            safetensors \
            peft \
            trl \
            sentencepiece \
            protobuf

          python -m pip install --force-reinstall --no-deps \
            https://github.com/ogulcanaydogan/dgx-spark-llm-stack/releases/download/v0.1.0/torch-2.9.1a0+gitd38164a-cp312-cp312-linux_aarch64.whl
          python -m pip install --force-reinstall --no-deps \
            https://github.com/ogulcanaydogan/dgx-spark-llm-stack/releases/download/v0.1.0/bitsandbytes-0.49.0-cp312-cp312-linux_aarch64.whl

      - name: Run inference matrix (7B/14B/32B x FP16/NF4/FP4)
        shell: bash
        run: |
          set -euo pipefail
          source .venv-bench-ci/bin/activate
          export HF_HUB_DISABLE_PROGRESS_BARS=1
          export TRANSFORMERS_VERBOSITY=error
          export BITSANDBYTES_NOWELCOME=1
          mkdir -p artifacts/benchmarks/logs
          python -u scripts/benchmark_inference.py \
            --models Qwen/Qwen2.5-7B-Instruct,Qwen/Qwen2.5-14B-Instruct,Qwen/Qwen2.5-32B-Instruct \
            --quantizations fp16,nf4,fp4 \
            --tokens 256 \
            --runs 5 \
            --device-map cuda \
            --output-json "${INFERENCE_JSON}" \
            > "artifacts/benchmarks/logs/inference-${BENCH_DATE}.log" 2>&1
          tail -n 40 "artifacts/benchmarks/logs/inference-${BENCH_DATE}.log"

      - name: Run perplexity matrix (WikiText-2 validation)
        shell: bash
        run: |
          set -euo pipefail
          source .venv-bench-ci/bin/activate
          export HF_HUB_DISABLE_PROGRESS_BARS=1
          export TRANSFORMERS_VERBOSITY=error
          export BITSANDBYTES_NOWELCOME=1
          python -u scripts/evaluate_perplexity.py \
            --models Qwen/Qwen2.5-7B-Instruct,Qwen/Qwen2.5-14B-Instruct,Qwen/Qwen2.5-32B-Instruct \
            --quantizations fp16,nf4,fp4 \
            --dataset wikitext \
            --dataset-config wikitext-2-raw-v1 \
            --split validation \
            --subset-size 32 \
            --max-length 512 \
            --batch-size 1 \
            --seed 1337 \
            --device-map cuda \
            --output-json "${QUALITY_JSON}" \
            > "artifacts/benchmarks/logs/perplexity-${BENCH_DATE}.log" 2>&1
          tail -n 40 "artifacts/benchmarks/logs/perplexity-${BENCH_DATE}.log"

      - name: Validate JSON outputs
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "${INFERENCE_JSON}" "${QUALITY_JSON}"
          test -s "${INFERENCE_JSON}"
          test -s "${QUALITY_JSON}"
          jq -e . "${INFERENCE_JSON}" > /dev/null
          jq -e . "${QUALITY_JSON}" > /dev/null

      - name: Package benchmark outputs
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${BENCH_ARCHIVE}" "${INFERENCE_JSON}" "${QUALITY_JSON}"
          ls -lh "${BENCH_ARCHIVE}"

      - name: Upload FP4 benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: phase3-fp4-${{ env.BENCH_DATE }}
          path: ${{ env.BENCH_ARCHIVE }}
          if-no-files-found: error
          retention-days: 14
