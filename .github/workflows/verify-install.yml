name: verify-install

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  fresh-install-check:
    name: Fresh install + verify_install.py on DGX Spark
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: [self-hosted, linux, arm64, dgx-spark]
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create clean virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv-ci
          source .venv-ci/bin/activate
          python -m pip install --upgrade pip

      - name: Run installer against latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source .venv-ci/bin/activate
          ./install.sh

      - name: Re-run verification and fail on any failed checks
        shell: bash
        run: |
          set -euo pipefail
          source .venv-ci/bin/activate
          python3 scripts/verify_install.py | tee verify_install.log
          python3 - <<'PY'
          import sys

          failures = []

          try:
              import torch
              if not torch.cuda.is_available():
                  failures.append("PyTorch CUDA is not available")
              if not torch.version.cuda:
                  failures.append("PyTorch CUDA version is missing")
          except Exception as exc:
              failures.append(f"PyTorch check failed: {exc}")

          try:
              import bitsandbytes  # noqa: F401
          except Exception as exc:
              failures.append(f"bitsandbytes import failed: {exc}")

          if failures:
              print("Critical verification checks failed:")
              for failure in failures:
                  print(f" - {failure}")
              sys.exit(1)
          PY
